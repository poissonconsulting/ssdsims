url: https://poissonconsulting.github.io/ssdsims/
template:
  bootstrap: 5

reference:
- title: Scenarios and task expansion
  desc: >
    Define a declarative simulation scenario and expand it into the per-step
    task tables (`sample`, `fit`, `hc`) that the targets-based pipeline
    builds on, with a baseline loop runner.
  contents:
  - ssd_data
  - ssd_define_scenario
  - ssd_scenario_tasks
  - ssd_scenario_sample_tasks
  - ssd_scenario_fit_tasks
  - ssd_scenario_hc_tasks
  - ssd_run_scenario_baseline
  - ssd_run_scenario_shards

- title: Simulation pipeline
  desc: >
    The immediate (non-targets) pipeline: simulate data, fit distributions, and
    estimate hazard concentrations across simulations, end to end.
  contents:
  - ssd_sim_data
  - ssd_fit_dists_sims
  - ssd_hc_sims
  - ssd_run_scenario

- title: Targets pipeline
  desc: >
    Group a step's tasks into per-shard tables keyed by `partition_by`, run a
    shard with the per-task RNG primitives writing one Parquet per shard, and
    fan in a summary - the building blocks of the static-branching `targets`
    pipeline (see the `inst/targets-templates/local/_targets.R` template).
  contents:
  - ssd_scenario_sample_shards
  - ssd_scenario_fit_shards
  - ssd_scenario_hc_shards
  - ssd_run_sample_step
  - ssd_run_fit_step
  - ssd_run_hc_step
  - ssd_summarize

- title: Scenario accessors
  desc: >
    A technical detail of the pipelines: isolate an already-materialised value
    from a scenario by name - the dataset tibble or the `min_pmix` function.
    Names (not values) drive task hashing, so these accessors resolve a name
    back to the value carried on the scenario for execution.
  contents:
  - scenario_dataset
  - scenario_min_pmix

- title: Reproducible RNG
  desc: >
    Parallel-safe seeding helpers for the two RNG paths: the dqrng + hash
    backend (targets path) and L'Ecuyer-CMRG sub-streams (legacy path).
  contents:
  - task_primer
  - local_dqrng_backend
  - local_dqrng_state
  - with_dqrng_state
  - local_lecuyer_cmrg_seed
  - with_lecuyer_cmrg_seed
  - local_lecuyer_cmrg_state
  - with_lecuyer_cmrg_state

- title: Package
  contents:
  - ssdsims-package
