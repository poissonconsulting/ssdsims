# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: This workflow is overkill for most R packages and
# check-standard.yaml is likely a better choice.
# usethis::use_github_action("check-standard") will install it.
#
# TEMPORARY: The smoke test job and dynamic matrix generation have been
# removed. The rcc-full matrix is pinned to all Windows branches
# (devel/release/oldrel-1) plus R 4.2 on Linux, and rcc-suggests is pinned to
# a single entry ("without quarto"). Revert to restore the full matrix and
# smoke test.
on:
  push:
    branches:
      - main
      - master
      - release
      - next
      - cran-*
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to check out"
        required: false
        default: "main"
      versions-matrix:
        description: "Create a matrix of R versions"
        type: boolean
        default: false
      dep-suggests-matrix:
        description: "Create a matrix of suggested dependencies"
        type: boolean
        default: false
      run-rcc-full:
        description: "Run rcc-full job"
        type: boolean
        default: false
      run-rcc-suggests:
        description: "Run rcc-suggests job"
        type: boolean
        default: false
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "10 1 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ref || github.head_ref || github.sha }}-${{ github.base_ref || '' }}
  cancel-in-progress: true

name: rcc

jobs:
  rcc-full:
    runs-on: ${{ matrix.os }}

    name: 'rcc: ${{ matrix.os }} (${{ matrix.r }}) ${{ matrix.desc }}'

    # Begin custom: services
    # End custom: services

    # TEMPORARY: pinned to all Windows branches + R 4.2 on Linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            r: devel
          - os: windows-latest
            r: release
          - os: windows-latest
            r: oldrel-1
          - os: ubuntu-24.04
            r: "4.2"

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/workflows/custom/before-install
        if: hashFiles('.github/workflows/custom/before-install/action.yml') != ''

      - uses: ./.github/workflows/install
        with:
          r-version: ${{ matrix.r }}
          cache-version: rcc-full-1
          token: ${{ secrets.GITHUB_TOKEN }}
          needs: build, check

      - uses: ./.github/workflows/custom/after-install
        if: hashFiles('.github/workflows/custom/after-install/action.yml') != ''

      - name: Must allow NOTEs if packages are missing, even with _R_CHECK_FORCE_SUGGESTS_
        run: |
          if (Sys.getenv("RCMDCHECK_ERROR_ON") %in% c("", "note")) {
            pkgs <- setdiff(desc::desc_get_deps()$package, "R")
            installable <- vapply(pkgs, FUN.VALUE = logical(1), requireNamespace, quietly = TRUE)
            if (any(!installable)) {
              message("Missing packages: ", paste(pkgs[!installable], collapse = ", "))
              cat('RCMDCHECK_ERROR_ON="warning"\n', file = Sys.getenv("GITHUB_ENV"), append = TRUE)
            }
          }
        shell: Rscript {0}

      - uses: ./.github/workflows/update-snapshots
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          base: ${{ github.head_ref }}

      - uses: ./.github/workflows/check
        if: ${{ ! matrix.covr }}
        with:
          results: ${{ runner.os }}-r${{ matrix.r }}

      - uses: ./.github/workflows/covr
        if: ${{ matrix.covr }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

# The status update is taken care of by R-CMD-check-status.yaml

  rcc-suggests:
    runs-on: ubuntu-24.04

    name: Without ${{ matrix.package }}

    # Begin custom: services
    # End custom: services

    # TEMPORARY: pinned to a single entry ("without quarto")
    strategy:
      fail-fast: false
      matrix:
        package:
          - quarto

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/workflows/custom/before-install
        if: hashFiles('.github/workflows/custom/before-install/action.yml') != ''

      - uses: ./.github/workflows/install
        with:
          cache-version: rcc-dev-${{ matrix.package }}-1
          needs: build, check
          extra-packages: "any::rcmdcheck any::remotes ."
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove ${{ matrix.package }} and all strong dependencies
        run: |
          pkg <- "${{ matrix.package }}"
          pkgs <- tools::package_dependencies(pkg, reverse = TRUE)[[1]]
          installed <- rownames(utils::installed.packages())
          to_remove <- c(pkg, intersect(pkgs, installed))
          print(to_remove)
          remove.packages(to_remove)
        shell: Rscript {0}

      - name: Session info
        run: |
          options(width = 100)
          if (!requireNamespace("sessioninfo", quietly = TRUE)) install.packages("sessioninfo")
          pkgs <- installed.packages()[, "Package"]
          sessioninfo::session_info(pkgs, include_base = TRUE)
        shell: Rscript {0}

      - uses: ./.github/workflows/custom/after-install
        if: hashFiles('.github/workflows/custom/after-install/action.yml') != ''

      - name: Must allow NOTEs, even with _R_CHECK_FORCE_SUGGESTS_
        run: |
          if (Sys.getenv("RCMDCHECK_ERROR_ON") %in% c("", "note")) {
            cat('RCMDCHECK_ERROR_ON="warning"\n', file = Sys.getenv("GITHUB_ENV"), append = TRUE)
          }
        shell: Rscript {0}

      - name: Check env vars
        run: |
          print(Sys.getenv('_R_CHECK_FORCE_SUGGESTS_'))
          print(Sys.getenv('RCMDCHECK_ERROR_ON'))
        shell: Rscript {0}

      - uses: ./.github/workflows/check
        with:
          results: ${{ matrix.package }}

# The status update is taken care of by R-CMD-check-status.yaml
