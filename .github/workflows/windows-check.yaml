# TEMPORARY: Windows-only R CMD check for iterating on a Windows-specific
# failure. The standard `rcc` smoke test + matrix is disabled on PRs while this
# is in place (see R-CMD-check.yaml). Remove this file and restore the
# pull_request trigger in R-CMD-check.yaml before merge.
on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

name: windows-check

jobs:
  windows-check:
    runs-on: windows-latest

    name: "R CMD check: windows-latest (release)"

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Vignettes are skipped on purpose: the quarto vignettes spawn a child R
      # process (via the quarto CLI) that does not see the package on its
      # library path during `R CMD build`, which is a separate infrastructure
      # issue from the manifest fix this temporary workflow exists to validate.
      - uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          args: 'c("--no-manual", "--ignore-vignettes")'
          upload-snapshots: true
          error-on: '"error"'
